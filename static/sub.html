<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Spider Sub</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;family=Vazirmatn:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet">
<style>
:root{--bg:#06060e;--bg2:#0d0d1a;--bg3:#14142a;--bg4:#1a1a30;--txt:#e0e0f0;--txt2:#7070a0;
  --neon:#ff1744;--g2:#00e676;--gold:#ffab00;--blue:#448aff;--purple:#7c4dff;--r:12px;
  --glass-bg:rgba(22,22,42,.7);--glass-border:rgba(255,255,255,.08);--glass-blur:24px;
  --grad-neon:linear-gradient(135deg,var(--neon),var(--purple));
  --grad-blue:linear-gradient(135deg,var(--blue),var(--purple));
  --grad-green:linear-gradient(135deg,var(--g2),var(--gold))}

/* Light theme */
[data-theme="light"]{--bg:#f5f5f5;--bg2:#ffffff;--bg3:#e8e8e8;--bg4:#dddddd;--txt:#111111;--txt2:#555555;
  --neon:#cc0000;--g2:#00a340;--gold:#cc8800;--blue:#3366cc;--purple:#6633cc;
  --glass-bg:rgba(255,255,255,.7);--glass-border:rgba(0,0,0,.08)}
[data-theme="light"] .card{box-shadow:0 0 20px rgba(0,0,0,.08)}
[data-theme="light"] .cfg-v{background:rgba(0,0,0,.04);color:#222}
[data-theme="light"] .hdr{background:linear-gradient(135deg,rgba(204,0,0,.06),rgba(102,51,204,.04))}
*{margin:0;padding:0;box-sizing:border-box}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5;transform:scale(.8)}}
@keyframes neonPulse{0%,100%{box-shadow:0 0 5px var(--neon),0 0 15px var(--neon)}50%{box-shadow:0 0 20px var(--neon),0 0 40px var(--neon)}}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes scaleIn{from{transform:scale(.95);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes rotate3d{0%{transform:perspective(500px) rotateY(0deg)}100%{transform:perspective(500px) rotateY(360deg)}}
body{font-family:'Vazirmatn','system-ui',-apple-system,sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;overflow-x:hidden;display:flex;flex-direction:column;align-items:center}

/* BG */
.bg{position:fixed;inset:0;z-index:0;pointer-events:none}
.bg .o{position:absolute;border-radius:50%;filter:blur(160px);animation:f 14s ease-in-out infinite}
.bg .o:nth-child(1){width:400px;height:400px;background:var(--neon);top:-80px;right:-60px;opacity:.08}
.bg .o:nth-child(2){width:300px;height:300px;background:var(--purple);bottom:-60px;left:-50px;opacity:.06;animation-delay:-7s}
.bg .o:nth-child(3){width:250px;height:250px;background:var(--blue);top:40%;left:60%;opacity:.04;animation-delay:-3s}
.bg .o:nth-child(4){width:200px;height:200px;background:var(--g2);bottom:30%;right:70%;opacity:.03;animation-delay:-10s}
@keyframes f{0%,100%{transform:translate(0,0)}33%{transform:translate(15px,-12px)}66%{transform:translate(-8px,8px)}}

/* Particles */
.particles{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.particle{position:absolute;width:3px;height:3px;background:rgba(255,255,255,.12);border-radius:50%;animation:float linear infinite}
@keyframes float{0%{transform:translateY(100vh) scale(0);opacity:0}10%{opacity:1}90%{opacity:1}100%{transform:translateY(-20px) scale(1);opacity:0}}

.container{max-width:520px;width:100%;padding:20px 16px;position:relative;z-index:1}

/* Card */
.card{background:var(--glass-bg);backdrop-filter:blur(var(--glass-blur)) saturate(180%);-webkit-backdrop-filter:blur(var(--glass-blur)) saturate(180%);border:1px solid var(--glass-border);border-radius:20px;overflow:hidden;margin-bottom:16px;box-shadow:0 8px 40px rgba(0,0,0,.3),0 0 40px rgba(255,23,68,.08);position:relative;animation:slideUp .5s ease-out}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,var(--neon),var(--purple),var(--blue),transparent);opacity:.9;z-index:2;background-size:200% 100%;animation:gr 4s linear infinite}
.card:hover{box-shadow:0 12px 50px rgba(0,0,0,.4),0 0 60px rgba(255,23,68,.12);transform:translateY(-3px);transition:all .3s ease}
@keyframes gr{0%{background-position:0% 0}100%{background-position:200% 0}}

/* Header */
.hdr{background:linear-gradient(135deg,rgba(255,23,68,.12),rgba(124,77,255,.08));padding:32px 20px;text-align:center;position:relative}
.hdr::after{content:'';position:absolute;bottom:0;left:10%;right:10%;height:1px;background:linear-gradient(90deg,transparent,var(--neon),var(--purple),transparent)}
.hdr-av{width:64px;height:64px;border-radius:50%;background:var(--grad-neon);display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:26px;font-weight:800;color:#fff;box-shadow:0 4px 24px rgba(255,23,68,.3),0 0 40px rgba(255,23,68,.15);transform:perspective(400px) rotateX(2deg);transition:all .3s ease;animation:neonPulse 3s ease-in-out infinite}
.hdr-av:hover{transform:perspective(400px) rotateX(0deg) scale(1.1);box-shadow:0 6px 30px rgba(255,23,68,.4),0 0 50px rgba(255,23,68,.2)}
.hdr-nm{font-size:22px;font-weight:800;background:var(--grad-neon);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hdr-pr{font-size:10px;color:var(--txt2);margin-top:4px;letter-spacing:3px;text-transform:uppercase;font-weight:500}

/* Body */
.body{padding:20px}

/* Stats */
.sts{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px}
.st{background:var(--bg3);border-radius:var(--r);padding:14px 8px;text-align:center;border:1px solid var(--glass-border);transition:all .3s ease;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);transform-style:preserve-3d;perspective:600px;animation:scaleIn .5s ease-out}
.st:hover{border-color:var(--neon);transform:translateY(-3px) translateZ(8px);box-shadow:0 8px 24px rgba(255,23,68,.15),0 0 30px rgba(255,23,68,.08)}
.st-v{font-size:17px;font-weight:700;color:var(--neon);font-family:'Inter',monospace;transition:all .3s ease}
.st:hover .st-v{transform:translateZ(5px);text-shadow:0 0 12px currentColor}
.st-l{font-size:10px;color:var(--txt2);margin-top:4px}
.st.g .st-v{color:var(--g2)}.st.w .st-v{color:var(--gold)}.st.b .st-v{color:var(--neon)}

/* Progress */
.pb{margin-bottom:18px}
.pb-h{display:flex;justify-content:space-between;margin-bottom:6px;font-size:11px}
.pb-h span{color:var(--txt2)}.pb-h b{color:var(--neon);font-size:12px}
.pb-bg{height:8px;background:var(--bg3);border-radius:4px;overflow:hidden;box-shadow:inset 0 1px 3px rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.05)}
.pb-f{height:100%;border-radius:4px;background:linear-gradient(90deg,#00e676,var(--gold) 40%,var(--neon));transition:width 1s cubic-bezier(.25,.46,.45,.94);position:relative;overflow:hidden}
.pb-f::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.25),transparent);animation:sh 2.5s ease-in-out infinite}
@keyframes sh{0%{transform:translateX(-100%)}100%{transform:translateX(300%)}}

/* Config box */
.cfg{background:var(--bg4);border:1px solid var(--glass-border);border-radius:var(--r);padding:14px;margin-bottom:12px;transition:all .3s cubic-bezier(.25,.46,.45,.94);backdrop-filter:blur(8px);position:relative;overflow:hidden}
.cfg::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--neon),transparent);opacity:0;transition:opacity .3s ease}
.cfg:hover{border-color:var(--neon);box-shadow:0 0 30px rgba(255,23,68,.1);transform:perspective(500px) rotateX(2deg)}
.cfg:hover::before{opacity:.6}
.cfg-l{font-size:10px;color:var(--txt2);text-transform:uppercase;letter-spacing:2px;margin-bottom:8px}
.cfg-v{font-family:'Inter','Courier New',monospace;font-size:11px;direction:ltr;text-align:left;word-break:break-all;color:var(--txt);line-height:1.8;max-height:100px;overflow-y:auto;background:rgba(0,0,0,.25);padding:10px;border-radius:6px}

/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:12px 20px;border:none;border-radius:var(--r);font-size:13px;font-weight:600;cursor:pointer;transition:all .25s cubic-bezier(.25,.46,.45,.94);font-family:inherit;text-decoration:none;position:relative;overflow:hidden}
.btn::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.15),transparent);transition:left .5s ease}
.btn:hover::before{left:100%}
.btn-n{background:linear-gradient(135deg,var(--neon),#c2185b);color:#fff;flex:1;box-shadow:0 4px 16px rgba(255,23,68,.25)}.btn-n:hover{filter:brightness(1.15);box-shadow:0 8px 28px rgba(255,23,68,.35);transform:translateY(-3px)}.btn-n:active{transform:translateY(0)}
.btn-g{background:var(--bg3);color:var(--txt);flex:1;backdrop-filter:blur(8px)}.btn-g:hover{background:var(--bg4);transform:translateY(-2px);box-shadow:0 6px 16px rgba(0,0,0,.25)}.btn-g:active{transform:translateY(0)}
.btn-b{background:rgba(68,138,255,.1);color:var(--blue);backdrop-filter:blur(8px);border:1px solid rgba(68,138,255,.15)}.btn-b:hover{background:rgba(68,138,255,.18);transform:translateY(-2px);box-shadow:0 4px 12px rgba(68,138,255,.2)}
.btn-p{background:rgba(124,77,255,.1);color:var(--purple);backdrop-filter:blur(8px);border:1px solid rgba(124,77,255,.15)}.btn-p:hover{background:rgba(124,77,255,.18);transform:translateY(-2px);box-shadow:0 4px 12px rgba(124,77,255,.2)}
.br{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}

/* Ping */
.ping-c{text-align:center;margin:16px 0}
.ping-b{padding:14px 36px;background:linear-gradient(135deg,var(--blue),var(--purple));color:#fff;border:none;border-radius:var(--r);font-size:14px;font-weight:700;cursor:pointer;transition:all .25s cubic-bezier(.25,.46,.45,.94);font-family:inherit;position:relative;overflow:hidden;box-shadow:0 4px 20px rgba(68,138,255,.25)}
.ping-b::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--purple),var(--blue));opacity:0;transition:opacity .3s}
.ping-b:hover{filter:brightness(1.15);box-shadow:0 8px 30px rgba(68,138,255,.45),0 0 40px rgba(124,77,255,.2);transform:translateY(-3px) scale(1.02)}
.ping-b:hover::before{opacity:.3}
.ping-b:active{transform:translateY(0) scale(.98)}
.ping-b:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}
.ping-r{margin-top:10px;font-size:18px;font-weight:700}
.ping-r.f{color:var(--g2)}.ping-r.m{color:var(--gold)}.ping-r.s{color:var(--neon)}
.ping-status{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;padding:4px 10px;border-radius:20px;margin-top:8px}
.ping-status::before{content:'';width:8px;height:8px;border-radius:50%;animation:pulse 1.5s ease-in-out infinite}
.ping-status.ok{background:rgba(0,230,118,.15);color:var(--g2)}.ping-status.ok::before{background:var(--g2);box-shadow:0 0 8px var(--g2)}
.ping-status.warn{background:rgba(255,171,0,.15);color:var(--gold)}.ping-status.warn::before{background:var(--gold);box-shadow:0 0 8px var(--gold);animation-duration:2s}
.ping-status.err{background:rgba(255,23,68,.15);color:var(--neon)}.ping-status.err::before{background:var(--neon);box-shadow:0 0 8px var(--neon);animation-duration:1s}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}

/* Apps */
.ap{margin-top:20px}
.ap-t{font-size:11px;font-weight:700;color:var(--txt2);text-align:center;margin-bottom:12px;text-transform:uppercase;letter-spacing:3px}
.ap-os{font-size:10px;font-weight:700;color:var(--txt2);margin:16px 0 8px;text-transform:uppercase;letter-spacing:2px;padding:4px 10px;background:var(--bg3);border-radius:4px;display:inline-block}
.ap-g{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.ap-c{display:flex;align-items:center;gap:10px;padding:12px;background:var(--bg3);border-radius:var(--r);cursor:pointer;transition:all .3s cubic-bezier(.25,.46,.45,.94);text-decoration:none;color:var(--txt);border:1px solid var(--glass-border);transform-style:preserve-3d;perspective:600px;backdrop-filter:blur(10px);position:relative;overflow:hidden}
.ap-c::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.08),transparent);transition:left .6s ease}
.ap-c:hover::before{left:100%}
.ap-c:hover{border-color:var(--neon);box-shadow:0 10px 30px rgba(255,23,68,.15),0 0 20px rgba(255,23,68,.08);transform:perspective(600px) rotateX(3deg) scale(1.04) translateZ(5px);z-index:2}
.ap-c:active{transform:perspective(600px) rotateX(0deg) scale(.98)}
.ap-ic{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.2);transition:all .3s ease}
.ap-c:hover .ap-ic{transform:rotateY(15deg) scale(1.1);box-shadow:0 4px 12px rgba(0,0,0,.3)}
.ap-ic.ios{background:rgba(68,138,255,.15);color:var(--blue)}
.ap-ic.and{background:rgba(0,230,118,.15);color:var(--g2)}
.ap-ic.win{background:rgba(68,138,255,.12);color:var(--blue)}
.ap-ic.cls{background:rgba(255,171,0,.15);color:var(--gold)}
.ap-nm{font-size:13px;font-weight:600}.ap-os2{font-size:10px;color:var(--txt2)}

/* Toast */
.tst{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--glass-bg);backdrop-filter:blur(var(--glass-blur)) saturate(180%);-webkit-backdrop-filter:blur(var(--glass-blur)) saturate(180%);border:1px solid var(--neon);color:var(--txt);padding:12px 28px;border-radius:20px;font-size:13px;z-index:999;opacity:0;transition:all .3s cubic-bezier(.25,.46,.45,.94);pointer-events:none;box-shadow:0 4px 24px rgba(0,0,0,.5)}
.tst.s{opacity:1;transform:translateX(-50%) translateY(0)}

/* Loading */
.ld{text-align:center;padding:60px 20px}
.sp{width:32px;height:32px;border:3px solid var(--bg3);border-top-color:var(--neon);border-radius:50%;animation:sp .8s linear infinite;margin:0 auto 14px}
@keyframes sp{to{transform:rotate(360deg)}}

.err{text-align:center;padding:50px 20px}.err h2{color:var(--neon);margin-bottom:8px}.err p{color:var(--txt2);font-size:13px}

.ft{text-align:center;padding:8px;font-size:10px;color:var(--txt2);position:relative;z-index:1}.ft a{color:var(--neon);text-decoration:none}

/* Status bar */
.sbar{display:flex;justify-content:center;gap:20px;margin-bottom:16px;flex-wrap:wrap}
.sbar-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--txt2)}
.sbar-dot{width:8px;height:8px;border-radius:50%}
.sbar-dot.on{background:var(--g2);box-shadow:0 0 8px var(--g2);animation:pulse 1.5s ease-in-out infinite}
.sbar-dot.off{background:var(--neon);box-shadow:0 0 8px var(--neon);animation:pulse 1.5s ease-in-out infinite}

/* Mobile */
@media(max-width:480px){
  .container{padding:12px 10px}
  .hdr{padding:24px 14px}
  .hdr-nm{font-size:18px}
  .body{padding:14px}
  .sts{gap:6px}
  .st{padding:10px 6px}
  .st-v{font-size:15px}
  .br{gap:6px}
  .btn{padding:14px 16px;font-size:14px;min-height:44px}
  .ap-g{grid-template-columns:1fr}
  .ap-c{padding:14px;min-height:52px}
  .ap-ic{width:40px;height:40px;font-size:20px}
  .ping-b{width:100%;padding:16px 36px;min-height:48px}
  .hdr-av{width:56px;height:56px;font-size:22px}
  .cfg-v{font-size:10px;padding:8px}
}
@media(max-width:360px){
  .sts{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>

<div class="bg"><div class="o"></div><div class="o"></div><div class="o"></div><div class="o"></div></div>
<div class="particles" id="particles"></div>

<!-- Theme Toggle -->
<button onclick="toggleTheme()" style="position:fixed;top:12px;right:12px;z-index:99;background:var(--bg3);border:1px solid var(--bg4);border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;color:var(--txt);transition:all .2s" title="Toggle theme">&#9728;</button>

<div class="container" id="app">
  <div class="ld"><div class="sp"></div><p style="color:var(--txt2);font-size:13px">در حال بارگذاری...</p></div>
</div>

<div class="tst" id="tst"></div>
<div class="ft">Powered by <a href="/spider" target="_blank">Spider Panel</a></div>

<script>
var uname=window.location.pathname.split('/').pop();
document.title='Spider | '+uname;

function fm(b){if(b===null||b===undefined||b===0)return'0 B';var n=Number(b);if(isNaN(n)||n<0)return'0 B';if(n<1)return'0 B';var u=['B','KB','MB','GB','TB'];var i=0;while(n>=1024&&i<u.length-1){n/=1024;i++}return n.toFixed(i?2:0)+' '+u[i]}
function tst(m){var t=document.getElementById('tst');t.textContent=m;t.classList.add('s');setTimeout(function(){t.classList.remove('s')},2000)}

var _cfg='',_subUrl='',_host='',_data=null;

async function load(){
  try{
    var r=await fetch('/api/sub/'+uname);
    if(!r.ok) throw new Error(r.status===404?'کاربر یافت نشد':'خطای سرور');
    _data=await r.json();
    _cfg=_data.config||_data.vless_link||'';
    _host=window.location.origin;
    _subUrl=_host+'/sub-sync/sub/'+uname;
    render(_data);
  }catch(e){
    document.getElementById('app').innerHTML='<div class="err"><h2>'+uname+'</h2><p>'+e.message+'</p><p style="margin-top:14px;font-size:11px">ابتدا در پنل Spider کاربر را بسازید</p></div>';
  }
}

function render(d){
  var used=Number(d.traffic_used_bytes)||0,limit=Number(d.traffic_limit_bytes)||0,pct=limit>0?Math.min(100,used/limit*100):0;
  var days=d.expire_days,daysCls,daysTxt;
  if(days===null||days===undefined){daysCls='g';daysTxt='نامحدود'}
  else if(days<=0){daysCls='b';daysTxt='منقضی'}
  else if(days>7){daysCls='g';daysTxt=days+' روز'}
  else if(days>2){daysCls='w';daysTxt=days+' روز'}
  else{daysCls='b';daysTxt=days+' روز'}
  var name=d.username||uname,init=(name||'U').charAt(0).toUpperCase();
  var proto=String(d.protocol||'vless').toUpperCase();
  var connections=Number(d.concurrent_connections)||2;
  var status=String(d.status||'active').toLowerCase(),isOk=status==='active';

  var h='';
  h+='<div class="card">';

  // Header
  h+='<div class="hdr"><div class="hdr-av">'+init+'</div><div class="hdr-nm">'+name+'</div><div class="hdr-pr">'+proto+' Subscription</div>';
  h+='<div class="sbar" style="margin-top:14px">';
  h+='<div class="sbar-item"><div class="sbar-dot '+(isOk?'on':'off')+'"></div>'+(isOk?'Active':'Expired')+'</div>';
  h+='<div class="sbar-item">'+proto+'</div>';
  h+='<div class="sbar-item">'+connections+' Conn</div>';
  h+='</div></div>';

  h+='<div class="body">';

  // Stats
  h+='<div class="sts">';
  h+='<div class="st"><div class="st-v">'+fm(used)+'</div><div class="st-l">Used</div></div>';
  h+='<div class="st"><div class="st-v">'+(limit>0?fm(limit):'∞')+'</div><div class="st-l">Total</div></div>';
  h+='<div class="st '+daysCls+'"><div class="st-v">'+daysTxt+'</div><div class="st-l">Left</div></div>';
  h+='</div>';

  // Progress
  h+='<div class="pb"><div class="pb-h"><span>Traffic '+pct.toFixed(1)+'%</span><b>'+fm(used)+' / '+(limit>0?fm(limit):'∞')+'</b></div><div class="pb-bg"><div class="pb-f" style="width:'+pct+'%"></div></div></div>';

  // Config
  if(_cfg){
    h+='<div class="cfg"><div class="cfg-l">Your Config</div><div class="cfg-v">'+_cfg+'</div></div>';
  }

  // Actions
  h+='<div class="br">';
  h+='<button class="btn btn-n" onclick="copyCfg()">Copy Config</button>';
  h+='<button class="btn btn-g" onclick="copySub()">Copy Sub Link</button>';
  h+='</div>';
  h+='<div class="br"><button class="btn btn-b" onclick="window.open(\'v2rayng://install-sub?url=\'+encodeURIComponent(_subUrl),\'_blank\')" style="flex:1">Import Now</button></div>';

  // Ping
  h+='<div class="ping-c"><button class="ping-b" id="pb" onclick="doPing()">Ping Config</button><div class="ping-r" id="pr"></div></div>';

  // Quick Import
  h+='<div class="ap"><div class="ap-t">Quick Import</div>';

  h+='<div class="ap-os">iOS</div><div class="ap-g">';
  h+=ac('V2Box','iOS','ios','https://apps.apple.com/app/v2box-v2ray-client/id6446814690');

}

async function doPing(){
  var btn=document.getElementById('pb'),res=document.getElementById('pr');
  btn.disabled=true;btn.textContent='Pinging...';res.textContent='';
  var t0=Date.now();
  try{
    var r=await fetch('/sub/'+uname+'/ping',{method:'HEAD',cache:'no-store'});
    var ms=Date.now()-t0,cls=ms<150?'f':ms<400?'m':'s',txt=ms<150?'GOOD':ms<400?'OK':'SLOW';
    res.textContent=txt+' '+ms+' ms';res.className='ping-r '+cls;
  }catch(e){
    res.textContent='TIMEOUT '+(Date.now()-t0)+' ms';res.className='ping-r s';
  }
  btn.disabled=false;btn.textContent='Ping Config';
}

// Theme toggle
function toggleTheme(){var t=document.documentElement;var cur=t.getAttribute('data-theme')||'dark';var nxt=cur==='dark'?'light':'dark';t.setAttribute('data-theme',nxt);localStorage.setItem('spider-sub-theme',nxt)}
(function(){var s=localStorage.getItem('spider-sub-theme')||'dark';document.documentElement.setAttribute('data-theme',s)})();

// Particle generation
function createParticles(){
  var container=document.getElementById('particles');
  if(!container) return;
  var count=Math.min(25,Math.max(15,Math.floor(window.innerWidth/30)));
  for(var i=0;i<count;i++){
    var p=document.createElement('div');
    p.className='particle';
    p.style.left=Math.random()*100+'%';
    p.style.animationDuration=(10+Math.random()*15)+'s';
    p.style.animationDelay=Math.random()*-20+'s';
    p.style.opacity=0.05+Math.random()*0.15;
    var size=2+Math.random()*4;
    p.style.width=size+'px';
    p.style.height=size+'px';
    container.appendChild(p);
  }
}
createParticles();
